name: Build themes

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: build/go/go.mod

      - name: Generate themes
        working-directory: build/go
        run: go run .

      - name: Move dist/ to repo-root
        run: |
          cp build/go/dist/theme-*.css /

      - name: Commit regenerated themes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate theme CSS"
            git push
          fi
